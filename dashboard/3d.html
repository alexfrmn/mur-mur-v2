<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murmur V2 — 3D Agent Mesh</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 15px; left: 15px; z-index: 10;
    color: #58a6ff; font-size: 12px; pointer-events: none;
  }
  #hud h1 { font-size: 16px; margin-bottom: 8px; text-shadow: 0 0 20px #58a6ff; }
  #hud .stat { color: #8b949e; margin: 2px 0; }
  #hud .stat span { color: #3fb950; }
  #tooltip {
    position: fixed; display: none; z-index: 20;
    background: rgba(13,17,23,0.95); border: 1px solid #30363d;
    border-radius: 8px; padding: 12px 16px; color: #c9d1d9;
    font-size: 12px; pointer-events: none; max-width: 350px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  }
  #tooltip .name { color: #58a6ff; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  #tooltip .role { color: #8b949e; font-size: 11px; margin-bottom: 8px; }
  #tooltip .msgs { color: #3fb950; }
  #tooltip .last-msg { color: #c9d1d9; font-size: 11px; margin-top: 6px; border-top: 1px solid #21262d; padding-top: 6px; }
  #conn-status {
    position: fixed; top: 15px; right: 15px; z-index: 10;
    padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;
  }
  .connected { background: #0d1117; border: 1px solid #238636; color: #3fb950; }
  .disconnected { background: #0d1117; border: 1px solid #da3633; color: #f85149; }
  #legend {
    position: fixed; bottom: 15px; left: 15px; z-index: 10;
    color: #484f58; font-size: 10px;
  }
</style>
</head>
<body>

<div id="hud">
  <h1>🕸️ Murmur V2 — Agent Mesh</h1>
  <div class="stat">Agents: <span id="s-agents">0</span></div>
  <div class="stat">Messages: <span id="s-msgs">0</span></div>
  <div class="stat">Live: <span id="s-live">0</span></div>
  <div class="stat">Uptime: <span id="s-uptime">—</span></div>
</div>

<div id="conn-status" class="disconnected">● Connecting...</div>
<div id="tooltip"></div>
<div id="legend">
  Drag to rotate · Scroll to zoom · Hover agents for info<br>
  🟢 encrypted · 🔵 plain · 🔴 error
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// === CONFIG ===
const AGENT_ROLES = {
  'agent-jarvis':       { label: 'JARVIS',       role: 'Tech Director · Opus 4.6',    color: 0x58a6ff, size: 1.8 },
  'agent-codex':        { label: 'CODEX',         role: 'Executor · GPT-5.3',          color: 0x3fb950, size: 1.2 },
  'codex2-agent-hq':    { label: 'CODEX-2',       role: 'Executor #2 · GPT-5.3',       color: 0x39d353, size: 1.1 },
  'glm-agent-hq':       { label: 'GLM-Analyst',   role: 'Analytics · GLM-4.7',         color: 0xf0883e, size: 1.1 },
  'haiku-agent-hq':     { label: 'HAIKU-QA',      role: 'QA · Claude Haiku',           color: 0xbc8cff, size: 0.9 },
  'glm-worker-agent-hq':{ label: 'GLM-Worker',    role: 'Worker · GLM-4.7',            color: 0xd29922, size: 0.9 },
  'agent-sasha':        { label: 'SASHA',         role: 'External · Sonnet 3.5',       color: 0xf85149, size: 1.2 },
};

// === SCENE SETUP ===
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 8, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 40;
controls.minDistance = 5;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.4, 0.85);
composer.addPass(bloom);

// === STARFIELD ===
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 200;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x444444, size: 0.15 })));

// === GRID ===
const gridHelper = new THREE.GridHelper(30, 30, 0x111122, 0x111122);
gridHelper.position.y = -3;
scene.add(gridHelper);

// === AGENTS ===
const agentMeshes = {};
const agentData = {};
const agentLabels = {};
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredAgent = null;

// Arrange agents in a circle with jarvis at center
function createAgentNodes(agents) {
  const radius = 7;
  agents.forEach((id, i) => {
    const cfg = AGENT_ROLES[id] || { label: id, role: 'Unknown', color: 0x888888, size: 1.0 };
    const isCenter = id === 'agent-jarvis';
    
    // Position
    let x, y, z;
    if (isCenter) {
      x = 0; y = 0; z = 0;
    } else {
      const nonCenterIdx = agents.filter(a => a !== 'agent-jarvis').indexOf(id);
      const total = agents.length - 1;
      const angle = (nonCenterIdx / total) * Math.PI * 2 - Math.PI / 2;
      x = Math.cos(angle) * radius;
      y = (Math.random() - 0.5) * 2;
      z = Math.sin(angle) * radius;
    }

    // Glowing sphere
    const geo = new THREE.SphereGeometry(cfg.size * 0.5, 32, 32);
    const mat = new THREE.MeshStandardMaterial({
      color: cfg.color, emissive: cfg.color, emissiveIntensity: 0.6,
      metalness: 0.3, roughness: 0.4,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.userData = { agentId: id };
    scene.add(mesh);
    agentMeshes[id] = mesh;

    // Outer glow ring
    const ringGeo = new THREE.RingGeometry(cfg.size * 0.6, cfg.size * 0.75, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: cfg.color, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(mesh.position);
    ring.lookAt(camera.position);
    mesh.userData.ring = ring;
    scene.add(ring);

    // Point light
    const light = new THREE.PointLight(cfg.color, isCenter ? 2 : 0.8, 10);
    light.position.copy(mesh.position);
    scene.add(light);
    mesh.userData.light = light;

    // Agent data tracking
    agentData[id] = { msgCount: 0, lastMsg: '', lastTime: null, active: false };

    // Text label (sprite)
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + cfg.color.toString(16).padStart(6, '0');
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(cfg.label, 128, 40);
    const tex = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(x, y + cfg.size * 0.5 + 0.8, z);
    sprite.scale.set(3, 0.75, 1);
    scene.add(sprite);
    agentLabels[id] = sprite;
  });

  // Draw base connections (thin lines from jarvis to each)
  const jarvisPos = agentMeshes['agent-jarvis']?.position;
  if (jarvisPos) {
    agents.filter(a => a !== 'agent-jarvis').forEach(id => {
      const pos = agentMeshes[id]?.position;
      if (!pos) return;
      const geo = new THREE.BufferGeometry().setFromPoints([jarvisPos, pos]);
      const mat = new THREE.LineBasicMaterial({ color: 0x1a1a2e, transparent: true, opacity: 0.3 });
      scene.add(new THREE.Line(geo, mat));
    });
  }
}

// === MESSAGE BEAMS ===
const activeBeams = [];

function createBeam(fromId, toId, type = 'encrypted') {
  const fromMesh = agentMeshes[fromId];
  const toMesh = agentMeshes[toId];
  if (!fromMesh || !toMesh) return;

  const color = type === 'error' ? 0xf85149 : type === 'encrypted' ? 0x3fb950 : 0x58a6ff;
  
  // Beam line
  const points = [fromMesh.position.clone(), toMesh.position.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 1.0, linewidth: 2 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  // Particle traveling along beam
  const particleGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const particleMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1.0 });
  const particle = new THREE.Mesh(particleGeo, particleMat);
  particle.position.copy(fromMesh.position);
  scene.add(particle);

  // Pulse the source node
  if (fromMesh.material) {
    fromMesh.material.emissiveIntensity = 2.0;
  }

  activeBeams.push({
    line, particle, from: fromMesh.position.clone(), to: toMesh.position.clone(),
    progress: 0, speed: 0.015 + Math.random() * 0.01, color,
    fromId, toId, mat,
  });
}

function updateBeams() {
  for (let i = activeBeams.length - 1; i >= 0; i--) {
    const b = activeBeams[i];
    b.progress += b.speed;
    
    // Move particle
    b.particle.position.lerpVectors(b.from, b.to, Math.min(b.progress, 1.0));
    
    // Fade out
    if (b.progress > 0.7) {
      const fade = 1.0 - (b.progress - 0.7) / 0.5;
      b.mat.opacity = Math.max(fade, 0);
      b.particle.material.opacity = Math.max(fade, 0);
    }

    // Remove when done
    if (b.progress > 1.2) {
      scene.remove(b.line);
      scene.remove(b.particle);
      b.line.geometry.dispose();
      b.particle.geometry.dispose();
      activeBeams.splice(i, 1);
    }
  }
}

// === NODE PULSE ANIMATION ===
function updateNodes(time) {
  Object.entries(agentMeshes).forEach(([id, mesh]) => {
    const cfg = AGENT_ROLES[id] || {};
    const baseIntensity = id === hoveredAgent ? 1.5 : 0.6;
    const pulse = Math.sin(time * 2 + mesh.position.x) * 0.15;
    
    // Decay emissive back to base
    mesh.material.emissiveIntensity += (baseIntensity + pulse - mesh.material.emissiveIntensity) * 0.05;
    
    // Gentle float
    mesh.position.y += Math.sin(time * 0.8 + mesh.position.x * 0.5) * 0.001;
    
    // Ring follows camera
    if (mesh.userData.ring) {
      mesh.userData.ring.position.copy(mesh.position);
      mesh.userData.ring.lookAt(camera.position);
      mesh.userData.ring.material.opacity = id === hoveredAgent ? 0.3 : 0.1;
    }
    
    // Label position
    if (agentLabels[id]) {
      agentLabels[id].position.y = mesh.position.y + (cfg.size || 1) * 0.5 + 0.8;
    }
  });
}

// === TOOLTIP ===
const tooltip = document.getElementById('tooltip');

function updateTooltip(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  
  const meshes = Object.values(agentMeshes);
  const intersects = raycaster.intersectObjects(meshes);
  
  if (intersects.length > 0) {
    const id = intersects[0].object.userData.agentId;
    const cfg = AGENT_ROLES[id] || { label: id, role: '?' };
    const data = agentData[id] || {};
    hoveredAgent = id;
    controls.autoRotate = false;
    
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
    tooltip.innerHTML = `
      <div class="name">● ${cfg.label}</div>
      <div class="role">${cfg.role}</div>
      <div class="msgs">Messages: ${data.msgCount || 0}</div>
      ${data.lastMsg ? `<div class="last-msg">"${data.lastMsg.slice(0, 120)}..."</div>` : ''}
    `;
  } else {
    hoveredAgent = null;
    tooltip.style.display = 'none';
    controls.autoRotate = true;
  }
}

document.addEventListener('mousemove', updateTooltip);

// === WEBSOCKET ===
const connEl = document.getElementById('conn-status');
let totalMsgs = 0;
let liveCount = 0;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  // Connect to the same origin — nginx upgrades /murmur/ to WebSocket
  const wsUrl = `${proto}//${location.host}/murmur/`;
  console.log('[3D] WS connecting to:', wsUrl);
  const ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    connEl.className = 'connected';
    connEl.textContent = '● Live';
  };

  ws.onclose = () => {
    connEl.className = 'disconnected';
    connEl.textContent = '● Reconnecting...';
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'init') {
      createAgentNodes(data.agents);
      document.getElementById('s-agents').textContent = data.agents.length;
      return;
    }

    if (data.type === 'stats') {
      document.getElementById('s-msgs').textContent = data.totalMessages;
      document.getElementById('s-live').textContent = data.activeClients;
      const m = Math.floor(data.uptimeMs / 60000);
      const h = Math.floor(m / 60);
      document.getElementById('s-uptime').textContent = h > 0 ? `${h}h ${m%60}m` : `${m}m`;
      return;
    }

    if (data.type === 'message') {
      totalMsgs++;
      liveCount++;
      setTimeout(() => liveCount--, 5000);

      const fromId = data.from || 'unknown';
      const toId = data.to || 'unknown';
      const type = data.type === 'error' ? 'error' : (data.encrypted ? 'encrypted' : 'plain');

      // Update agent data
      if (agentData[fromId]) {
        agentData[fromId].msgCount++;
        agentData[fromId].lastMsg = data.text || '';
        agentData[fromId].lastTime = data.ts;
      }

      // Fire beam
      if (!data.historical) {
        createBeam(fromId, toId, type);
      }
    }
  };
}

connectWS();

// === AMBIENT LIGHT ===
scene.add(new THREE.AmbientLight(0x222233, 0.5));

// === ANIMATION LOOP ===
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  controls.update();
  updateBeams();
  updateNodes(t);
  composer.render();
}

animate();

// === RESIZE ===
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
