apiVersion: v1
kind: Service
metadata:
  name: murmur-agent
  labels:
    app.kubernetes.io/name: murmur-agent
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: murmur-agent
  ports:
    - name: metrics
      port: 9464
      targetPort: metrics
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: murmur-agent
  labels:
    app.kubernetes.io/name: murmur-agent
spec:
  serviceName: murmur-agent
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: murmur-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: murmur-agent
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: daemon
          image: ghcr.io/acme/murmur-v2-daemon:2.2.0
          imagePullPolicy: IfNotPresent
          workingDir: /app
          env:
            - name: DATA_DIR
              value: /data
            - name: FLUSH_INTERVAL_MS
              value: "2000"
            - name: MURMUR_JETSTREAM
              value: "1"
            - name: MURMUR_JETSTREAM_MAX_DELIVER
              value: "5"
            - name: MURMUR_JETSTREAM_ACK_WAIT_MS
              value: "30000"
            - name: MURMUR_ACK_TIMEOUT_MS
              value: "15000"
            - name: MURMUR_STREAM_ACK_WINDOW
              value: "1"
            - name: MURMUR_STREAM_MAX_IN_FLIGHT_CHUNKS
              value: "64"
            - name: MURMUR_STREAM_MAX_IN_FLIGHT_BYTES
              value: "4194304"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - test -f /data/agent-config.json && test -w /data
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: agent-data
              mountPath: /data
            - name: agent-config
              mountPath: /data/agent-config.json
              subPath: agent-config.json
              readOnly: true
        - name: metrics
          image: ghcr.io/acme/murmur-v2-daemon:2.2.0
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - node
            - scripts/prometheus-exporter.mjs
          env:
            - name: DATA_DIR
              value: /data
            - name: METRICS_HOST
              value: 0.0.0.0
            - name: METRICS_PORT
              value: "9464"
          ports:
            - name: metrics
              containerPort: 9464
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: agent-data
              mountPath: /data
      volumes:
        - name: agent-config
          secret:
            secretName: murmur-agent-config
  volumeClaimTemplates:
    - metadata:
        name: agent-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
